<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
</head>
<body>
    
     <body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Enrollment Information</h2>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" class="form-control" name="pname" id="pname">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" class="form-control" name="category" id="category">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Stock Count</label>
                        <input type="number" class="form-control" name="scount" id="scount">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location Code</label>
                        <input type="text" class="form-control" name="lcode" id="lcode">
                    </div>
                    <div class="d-grid">
                        <button id="add" class="btn btn-danger">Add Record</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <table class="table table-bordered mt-3">
        <thead clas="table-dark">
        <tr>
            <th>Product Name</th>
            <th>Category</th>
            <th>Stock Count</th>
            <th>Location Code</th>
            <th>Last Updated</th>
        </tr>
        </thead>
        <tbody id="content"></tbody>
    </table> 
    <script src="inde.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
